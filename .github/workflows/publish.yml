name: publish
run-name: "${{ format('release {0}', inputs.bump) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'flat6solutions/opendocker'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Git Identity
        run: |
          git config --global user.email "kustovsteven@gmail.com"
          git config --global user.name "opendocker"

      - name: Install Dependencies
        run: bun install

      - name: Version
        id: version
        run: ./script/version.ts
        env:
          OPENDOCKER_BUMP: ${{ inputs.bump }}
          OPENDOCKER_VERSION: ${{ inputs.version }}
          GH_REPO: ${{ github.repository }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}

  build-cli:
    needs: version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'flat6solutions/opendocker'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: bun install

      - name: Build
        id: build
        run: |
          ./packages/cli/scripts/build.ts --all
        env:
          OPENDOCKER_VERSION: ${{ needs.version.outputs.version }}
          OPENDOCKER_RELEASE: "true"
          GH_REPO: ${{ needs.version.outputs.repo }}

      - uses: actions/upload-artifact@v4
        with:
          name: opendocker-cli
          path: packages/cli/dist

    outputs:
      version: ${{ needs.version.outputs.version }}

  publish:
    needs:
      - version
      - build-cli
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'flat6solutions/opendocker'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Git Identity
        run: |
          git config --global user.email "kustovsteven@gmail.com"
          git config --global user.name "opendocker"

      - name: Install Dependencies
        run: bun install

      - uses: actions/download-artifact@v4
        with:
          name: opendocker-cli
          path: packages/cli/dist

      - name: Publish
        run: ./script/publish.ts
        env:
          OPENDOCKER_VERSION: ${{ needs.version.outputs.version }}
          OPENDOCKER_RELEASE: "true"
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ needs.version.outputs.repo }}
